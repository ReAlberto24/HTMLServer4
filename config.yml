# global path variables:
#  $(ROOT), $(CWD)

server:
  # if the port is 80 and ssl is enabled,
  # it will automatically be changed to 443
  port: 80

  index-file: 'index.html'

  secret-key: null

  html-directory: '$(ROOT)/html'

  ssl:
    enabled: false
    cert: 'cert.pem'
    key: 'key.pem'
    key-password: ''